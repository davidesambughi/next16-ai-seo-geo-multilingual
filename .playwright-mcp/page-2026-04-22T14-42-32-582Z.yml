          - heading "What independent intelligence looks like in practice" [level=2] [ref=e166]
          - paragraph [ref=e167]: "Raising Kids in Portugal was built from a specific frustration: the near-total absence of honest, structured, non-commercial information for families seriously considering a move to Portugal. The market offered two things — relocation agencies with financial relationships with specific schools and landlords, and expat forums where individual experience often ran ahead of verified fact. Neither served families making a decision worth hundreds of thousands of euros in school fees, housing deposits, and life reorganisation."
          - paragraph [ref=e168]: "Every school profile in our guides reflects in-person visits, direct conversations with admissions teams and parent communities, and careful verification of the data points that actually matter: real acceptance rates (not the selective figures schools publish), the full fee structure including registration and capital levy charges, curriculum transition considerations for children arriving mid-programme, and the texture of each school's culture that does not appear in any prospectus."
          - paragraph [ref=e169]:
            - text: No school pays for placement here. No property company refers traffic to these guides. There are no affiliate links. The neighborhood commute data is observed at actual school-run times, not mapping software estimates in off-peak conditions. The visa information — covering the D7 Passive Income Visa, the D8 Digital Nomad Visa, and the restructured Golden Visa program — is reviewed against
            - link "official AIMA guidance" [ref=e170] [cursor=pointer]:
              - /url: https://www.aima.gov.pt
            - text: and updated when the rules change, as they did significantly between 2023 and 2025.
          - paragraph [ref=e171]: The information that matters most — visa changes, admission openings, school fee updates — moves faster than most guides can keep pace with. Join the families already following Raising Kids in Portugal’s research updates for 2026.
